name: Khipu Quant Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 2. Preparar el entorno Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Ejecutar el Motor Cuantitativo
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python update_data.py

      - name: 4. Guardar datos en GitHub
        run: |
          git config --global user.name "Khipu Quant Bot"
          git config --global user.email "bot@incastats.com"
          git add "ARCHIVOS JSON/"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de métricas VIP" && git push)
